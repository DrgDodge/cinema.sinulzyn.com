version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_POCKETBASE_URL=http://pb:8090
    depends_on:
      - pb
    restart: unless-stopped

  pb:
    build:
      context: .
      dockerfile: Dockerfile.pb
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb_data
    restart: unless-stopped