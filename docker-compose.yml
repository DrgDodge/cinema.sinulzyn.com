version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PUBLIC_POCKETBASE_URL=http://pb:8090
      - PB_ADMIN_EMAIL=${PB_ADMIN_EMAIL}
      - PB_ADMIN_PASSWORD=${PB_ADMIN_PASSWORD}
    depends_on:
      - pb
    restart: unless-stopped

  pb:
    build:
      context: .
      dockerfile: Dockerfile.pb
    ports:
      - "8090:8090"
    volumes:
      - ./pb_data:/pb/pb_data
    restart: unless-stopped